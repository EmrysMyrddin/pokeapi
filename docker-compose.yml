version: '2.4'
services:
  cache:
    image: redis:7.4.2-alpine3.21
    volumes:
      - redis_data:/data
    restart: always

  db:
    image: postgres:17.2-alpine3.21
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  app:
    user: ${RUN_AS:-pokeapi}
    build:
      context: .
      dockerfile: ./Resources/docker/app/Dockerfile
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    # volumes:
      # - .:/code
    links:
      - db
      - cache
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: always

  graphql-engine:
    image: hasura/graphql-engine:v2.48.1
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_LOG_LEVEL: "warn"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-pokemon}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anon
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      # HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
    networks:
      - default
      - dokploy-network

  graphiql:
    image: emrysmyrooin/pokeapi-graphiql
    expose:
      - 80
    depends_on:
      - graphql-engine
    restart: always
    networks:
      - default
      - dokploy-network

volumes:
  pg_data:
  redis_data:
  graphql_cache:

networks:
  dokploy-network:
    external: true
